<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>English AI Tutor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- 1. 核心版面與重疊修復 --- */
        :root {
            --primary: #8a2be2;
            --primary-rgb: 138, 43, 226;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body,
        html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: var(--bg-dark) !important;
            color: var(--text-main) !important;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #app {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            background-color: var(--bg-dark);
        }

        /* 🚀 解決重疊的核心：所有螢幕預設為絕對定位且隱藏 */
        .screen {
            display: none !important;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: var(--bg-dark);
        }

        /* 🚀 只有帶有 active 的螢幕才會顯示 */
        .screen.active {
            display: flex !important;
            z-index: 10;
        }

        /* --- 2. 介面裝飾樣式 --- */
        .gradient-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            /* 相容性屬性 */
            background-clip: text;
            /* 🚀 解決 VS Code 第 60 行警告 */
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 20px 0;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .option-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-card.selected {
            border-color: var(--primary);
            background: rgba(var(--primary-rgb), 0.15);
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3);
            margin-top: 20px;
        }

        /* --- 3. 對話氣泡流樣式 --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            border-radius: 50%;
        }

        .message-content {
            background: var(--card-bg);
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
        }

        .recording-controls {
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mic-button {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: #ff4b2b;
            border: none;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.4);
            cursor: pointer;
        }

        .settings-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="intro-screen" class="screen active">
            <h1 class="gradient-text">Speak with Confidence</h1>
            <p class="subtitle">Personalize your AI English speaking practice journey.</p>
            <div class="api-key-container">
                <input type="password" id="api-key-input" class="settings-input" placeholder="填入 API Key (可選)">
                <p style="font-size: 0.8rem; color: #888; margin-top: 10px; text-align: center;">
                    請確保您的 API Key 已正確設定
                </p>
            </div>
            <button id="start-btn" class="primary-btn">開始制定學習計劃</button>
        </div>

        <div id="questionnaire-screen" class="screen">
            <h2 style="text-align: center;">你的職業是？</h2>
            <div class="options-grid" data-step="1">
                <div class="option-card" data-value="engineer">💻 工程師</div>
                <div class="option-card" data-value="sales">🤝 銷售</div>
                <div class="option-card" data-value="student">🎓 學生</div>
                <div class="option-card" data-value="other">✨ 其他</div>
            </div>
            <button id="finish-btn" class="primary-btn">下一步</button>
        </div>

        <div id="learning-screen" class="screen">
            <div class="chat-container">
                <div class="chat-message ai-message">
                    <div class="avatar"><img src="avatar_f.svg" alt="AI"></div>
                    <div class="message-content" id="ai-greeting">Hello! Let's start our conversation.</div>
                </div>
            </div>
            <div class="recording-controls">
                <button id="mic-btn" class="mic-button">🎙️</button>
                <p id="user-live-transcript" style="color: #888; margin-top: 15px;">點擊麥克風開始說話</p>
            </div>
            <button id="restart-btn"
                style="background:none; border:none; color:#888; cursor:pointer; margin-top: 10px;">🔄 重新設定</button>
        </div>
    </div>

    <script src="script.js?v=20260325"></script>
</body>

</html>
