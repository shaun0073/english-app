<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>English AI Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* === 1. 核心版面設定 === */
        :root {
            --primary: #8a2be2;
            --primary-rgb: 138, 43, 226;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body,
        html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: var(--bg-dark) !important;
            color: var(--text-main) !important;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* 防止整個畫面亂滑 */
        }

        #app {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            background-color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        /* === 2. 解決重疊的核心邏輯 === */
        .screen {
            display: none !important;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: var(--bg-dark);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active {
            display: flex !important;
            z-index: 10;
        }

        .step {
            display: none !important;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            flex: 1;
            animation: fadeIn 0.4s ease;
        }

        .step.active {
            display: flex !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === 3. 介面美化 === */
        .gradient-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 20px 0;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* 選項卡片 */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .option-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .option-card:hover {
            border-color: #555;
        }

        .option-card.selected {
            border-color: var(--primary);
            background: rgba(var(--primary-rgb), 0.15);
            box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.2);
        }

        /* 按鈕 */
        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3);
            margin-top: 20px;
            width: 100%;
            transition: transform 0.1s;
        }

        .primary-btn:active {
            transform: scale(0.95);
        }

        .secondary-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            width: auto;
            align-self: center;
        }

        .settings-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #444;
            color: white;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        /* === 4. 學習對話頁面：一半一半版面 === */
        #learning-screen {
            padding: 0 !important;
            /* 滿版顯示 */
            overflow: hidden;
            /* 對話頁面不需要整頁滾動 */
        }

        .split-half {
            flex: 1;
            /* 各佔 50% 高度 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        /* 上半部：AI 經理 */
        .ai-half {
            background: linear-gradient(180deg, #1f1c2c 0%, var(--bg-dark) 100%);
        }

        /* 下半部：使用者 */
        .user-half {
            background: var(--card-bg);
            border-top: 2px solid var(--primary);
            box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.3);
        }

        .avatar.large {
            width: 80px;
            height: 80px;
            font-size: 3.5rem;
            border-radius: 50%;
            border: 3px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(138, 43, 226, 0.1);
            margin-bottom: 10px;
        }

        .transcript-box {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-top: 15px;
            box-sizing: border-box;
        }

        .ai-transcript {
            border-left: 4px solid var(--primary);
            color: #fff;
        }

        .user-transcript {
            border-left: 4px solid #ff4b2b;
            color: #888;
        }

        .recording-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ff4b2b;
            border: none;
            font-size: 2.2rem;
            box-shadow: 0 0 25px rgba(255, 75, 43, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mic-button:active {
            transform: scale(0.9);
        }

        #leave-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            margin: 0;
            padding: 8px 15px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- ==================== 1. 首頁 ==================== -->
        <div id="intro-screen" class="screen active">
            <h1 class="gradient-text">Speak with Confidence</h1>
            <p class="subtitle">為您量身打造的 AI 英文口說練習</p>

            <div style="margin-top: 20px;">
                <!-- 在 Canvas 環境中會自動帶入 API Key，使用者可以不用輸入 -->
                <input type="password" id="api-key-input" class="settings-input" placeholder="系統已自動連線至 AI (無需填寫)">
                <p style="font-size: 0.85rem; color: #666; margin-top: 10px; text-align: center;">
                    提供即時語音辨識與自然對話體驗
                </p>
            </div>

            <button id="start-btn" class="primary-btn" style="margin-top: auto; margin-bottom: 20px;">開始制定學習計劃</button>
        </div>

        <!-- ==================== 2. 三段式問卷頁 ==================== -->
        <div id="questionnaire-screen" class="screen">

            <!-- 關卡 1: 職業 -->
            <div id="step-1" class="step active">
                <h2 style="text-align: center; margin-bottom: 5px;">你的職業是？</h2>
                <p class="subtitle">幫助我們推薦最適合的單字</p>
                <div class="options-grid">
                    <div class="option-card selected">💻 工程師</div>
                    <div class="option-card">🤝 銷售人員</div>
                    <div class="option-card">🏠 全職媽媽</div>
                    <div class="option-card">🎓 學生</div>
                    <div class="option-card">✨ 其他</div>
                </div>
                <button id="next-1-btn" class="primary-btn" style="margin-top: auto; margin-bottom: 20px;">下一步
                    (1/3)</button>
            </div>

            <!-- 關卡 2: 程度 -->
            <div id="step-2" class="step">
                <h2 style="text-align: center; margin-bottom: 5px;">你的英語程度？</h2>
                <p class="subtitle">調整 AI 的語速與用詞難度</p>
                <div class="options-grid">
                    <div class="option-card selected">🌱 初級 (Beginner)</div>
                    <div class="option-card">🌿 中級 (Intermediate)</div>
                    <div class="option-card">🌳 進階 (Advanced)</div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: auto; margin-bottom: 20px;">
                    <button id="back-1-btn" class="secondary-btn" style="margin-top: 0; width: 30%;">上一步</button>
                    <button id="next-2-btn" class="primary-btn" style="margin-top: 0; flex: 1;">下一步 (2/3)</button>
                </div>
            </div>

            <!-- 關卡 3: 場景 -->
            <div id="step-3" class="step">
                <h2 style="text-align: center; margin-bottom: 5px;">你想練習的場景？</h2>
                <p class="subtitle">選擇您最想精進的情境</p>
                <div class="options-grid">
                    <div class="option-card selected">🏢 日常辦公</div>
                    <div class="option-card">📊 商務會議</div>
                    <div class="option-card">✈️ 出國旅行</div>
                    <div class="option-card">📝 考試備考</div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: auto; margin-bottom: 20px;">
                    <button id="back-2-btn" class="secondary-btn" style="margin-top: 0; width: 30%;">上一步</button>
                    <button id="finish-btn" class="primary-btn" style="margin-top: 0; flex: 1;">完成並進入對話</button>
                </div>
            </div>

        </div>

        <!-- ==================== 3. 學習對話頁 (一半一半版面) ==================== -->
        <div id="learning-screen" class="screen">

            <!-- 上半部：AI (經理/對話對象) -->
            <div class="split-half ai-half">
                <button id="leave-btn" class="secondary-btn">⬅ 離開</button>
                <div class="avatar large">👨‍💼</div>
                <h3 style="margin: 5px 0 0 0; color: var(--primary);">Manager</h3>
                <div class="transcript-box ai-transcript" style="color: #888;">
                    準備連線中...
                </div>
            </div>

            <!-- 下半部：使用者 (自己) -->
            <div class="split-half user-half">
                <div class="transcript-box user-transcript">
                    (輪到你時，說的話會顯示在這裡...)
                </div>
                <div class="recording-controls">
                    <button id="mic-btn" class="mic-button">🎙️</button>
                    <p id="status-text" style="color: #888; margin-top: 15px; font-size: 0.9rem;">等待錄音...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- === JavaScript 邏輯 === -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 抓取各個螢幕
            const introScreen = document.getElementById('intro-screen');
            const questionnaireScreen = document.getElementById('questionnaire-screen');
            const learningScreen = document.getElementById('learning-screen');

            // 抓取問卷步驟
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');
            const step3 = document.getElementById('step-3');

            // 初始化語音辨識功能 (Web Speech API)
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition = null;
            let currentRecognizedText = "";

            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false; // 講完一段就自動停止
                recognition.interimResults = true; // 即時顯示辨識結果
                recognition.lang = 'en-US'; // 練習英文所以設定英文
            }

            // === 呼叫 Gemini AI API 取得回覆 ===
            async function getAIResponse(userMessage) {
                const apiKey = ""; // 在此環境中會自動取得 Key
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                // 取得使用者設定的背景
                const role = document.querySelector('#step-1 .option-card.selected').innerText.replace(/.* /, '');
                const level = document.querySelector('#step-2 .option-card.selected').innerText.replace(/.* /, '');
                const scenario = document.querySelector('#step-3 .option-card.selected').innerText.replace(/.* /, '');

                // 設定 AI 的人格與限制
                const systemPrompt = `You are a helpful English conversation practice partner playing the role of a Manager. The user is a ${role}, their English level is ${level}, and the scenario is ${scenario}. Respond naturally and concisely to the user's prompt in English. Keep it under 2 short sentences.`;

                const payload = {
                    contents: [{ parts: [{ text: userMessage }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (data.candidates && data.candidates[0]) {
                        return data.candidates[0].content.parts[0].text;
                    }
                    return "I see. Let's continue our practice.";
                } catch (error) {
                    console.error(error);
                    return "Sorry, I missed that. Could you say it again?";
                }
            }

            // --- 點擊選項卡片的效果 ---
            const optionCards = document.querySelectorAll('.option-card');
            optionCards.forEach(card => {
                card.addEventListener('click', function () {
                    const siblings = this.parentElement.querySelectorAll('.option-card');
                    siblings.forEach(s => s.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });

            // --- 畫面與步驟切換邏輯 ---

            // 1. 首頁 -> 問卷 (Step 1)
            document.getElementById('start-btn').addEventListener('click', () => {
                introScreen.classList.remove('active');
                questionnaireScreen.classList.add('active');
                step1.classList.add('active');
                step2.classList.remove('active');
                step3.classList.remove('active');
            });

            // 2. Step 1 -> Step 2
            document.getElementById('next-1-btn').addEventListener('click', () => {
                step1.classList.remove('active');
                step2.classList.add('active');
                questionnaireScreen.scrollTop = 0;
            });

            document.getElementById('back-1-btn').addEventListener('click', () => {
                step2.classList.remove('active');
                step1.classList.add('active');
                questionnaireScreen.scrollTop = 0;
            });

            // 3. Step 2 -> Step 3
            document.getElementById('next-2-btn').addEventListener('click', () => {
                step2.classList.remove('active');
                step3.classList.add('active');
                questionnaireScreen.scrollTop = 0;
            });

            document.getElementById('back-2-btn').addEventListener('click', () => {
                step3.classList.remove('active');
                step2.classList.add('active');
                questionnaireScreen.scrollTop = 0;
            });

            // 4. Step 3 (完成) -> 學習對話頁
            document.getElementById('finish-btn').addEventListener('click', () => {
                // 🚀 解鎖瀏覽器語音限制
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const unlockSpeech = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(unlockSpeech);
                }

                questionnaireScreen.classList.remove('active');
                learningScreen.classList.add('active');

                // === 讓 AI 先講話的動態效果 ===
                const aiTranscript = document.querySelector('.ai-transcript');
                const userTranscript = document.querySelector('.user-transcript');
                const statusText = document.getElementById('status-text');

                userTranscript.innerText = "(輪到你時，說的話會顯示在這裡...)";
                userTranscript.style.color = "#888";
                statusText.innerText = "對方正在說話...";

                aiTranscript.innerText = "Manager is typing...";
                aiTranscript.style.color = "#888";

                // 1.5 秒後 AI 正式開口並發聲
                setTimeout(() => {
                    const greetingMessage = "Hello! Glad to see you here. Are you ready to start our conversation practice?";
                    aiTranscript.innerText = greetingMessage;
                    aiTranscript.style.color = "#fff";
                    statusText.innerText = "換你了，請點擊麥克風說話";

                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(greetingMessage);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        window.speechSynthesis.speak(utterance);
                    }
                }, 1500);
            });

            // 5. 離開 -> 回到首頁
            document.getElementById('leave-btn').addEventListener('click', () => {
                learningScreen.classList.remove('active');
                introScreen.classList.add('active');

                // 離開時停止講話與聆聽
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
                if (recognition) {
                    recognition.abort();
                }
            });

            // 6. 真實的語音辨識與 AI 回應機制
            document.getElementById('mic-btn').addEventListener('click', () => {
                const status = document.getElementById('status-text');
                const userTranscript = document.querySelector('.user-transcript');

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }

                if (!recognition) {
                    alert("您的瀏覽器不支援語音辨識功能，建議使用 Chrome 或 Safari。");
                    return;
                }

                // 開始錄音
                recognition.onstart = () => {
                    currentRecognizedText = "";
                    status.innerText = "正在聆聽... (請說英文)";
                    status.style.color = "#ff4b2b";
                    userTranscript.innerText = "...";
                    userTranscript.style.color = "#888";
                };

                // 即時顯示語音轉文字
                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }

                    currentRecognizedText = finalTranscript || interimTranscript;
                    if (currentRecognizedText) {
                        userTranscript.innerText = currentRecognizedText;
                        userTranscript.style.color = finalTranscript ? "#fff" : "#ccc";
                    }
                };

                recognition.onerror = (event) => {
                    console.error("Speech recognition error", event.error);
                    status.innerText = "錄音發生錯誤 (" + event.error + ")";
                    status.style.color = "red";
                };

                // 錄音結束後，把文字送給 AI
                recognition.onend = async () => {
                    if (!currentRecognizedText.trim()) {
                        status.innerText = "錄音結束，未偵測到聲音";
                        status.style.color = "#888";
                        setTimeout(() => {
                            status.innerText = "等待錄音... (再次點擊發言)";
                        }, 1500);
                        return;
                    }

                    status.innerText = "AI 思考中...";
                    status.style.color = "#888";

                    const aiTranscript = document.querySelector('.ai-transcript');
                    aiTranscript.innerText = "Manager is typing...";
                    aiTranscript.style.color = "#888";

                    // === 等待 AI 回覆 ===
                    const aiResponseText = await getAIResponse(currentRecognizedText);

                    aiTranscript.innerText = aiResponseText;
                    aiTranscript.style.color = "#fff";
                    status.innerText = "換你了，請點擊麥克風說話";

                    // 唸出 AI 的回覆
                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(aiResponseText);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        window.speechSynthesis.speak(utterance);
                    }
                };

                try {
                    recognition.start();
                } catch (e) {
                    console.log("語音辨識已經在執行中");
                }
            });
        });
    </script>
</body>

</html>
