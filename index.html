<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>English AI Tutor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- 1. 核心版面設定 (修正重疊關鍵) --- */
        :root {
            --primary: #8a2be2;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-muted: #a0a0a0;
        }

        body,
        html {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            background-color: var(--bg-dark) !important;
            color: white !important;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 🚀 這是解決重疊最重要的部分：所有螢幕預設全部消失 */
        .screen {
            display: none !important;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: var(--bg-dark);
        }

        /* 🚀 只有帶有 .active 標籤的螢幕才會顯示出來 */
        .screen.active {
            display: flex !important;
            z-index: 10;
        }

        /* --- 2. 精緻化介面樣式 --- */
        .gradient-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 20px 0;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .option-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-card.selected {
            border-color: var(--primary);
            background: rgba(138, 43, 226, 0.2);
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        /* --- 3. 學習練習頁 (氣泡與控制) --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            border-radius: 50%;
        }

        .message-content {
            background: var(--card-bg);
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
        }

        .recording-controls {
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mic-button {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: #ff4b2b;
            border: none;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.4);
            cursor: pointer;
        }

        .settings-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="intro-screen" class="screen active">
            <h1 class="gradient-text
